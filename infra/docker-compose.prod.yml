services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
        NEXT_PUBLIC_API_BASE_URL: /api/backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      NEXT_PUBLIC_DEPLOYMENT_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env.example
    environment:
      DEPLOYMENT_ENV: production
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/crypto_intelligence
      REDIS_URL: redis://redis:6379/0
      TRUSTED_HOSTS: localhost,127.0.0.1,backend,frontend,nginx,host.docker.internal
    command: >
      /bin/sh -c 'if [ -z "$$JWT_SECRET_KEY" ]; then
      export JWT_SECRET_KEY="$$(python -c "import secrets; print(secrets.token_urlsafe(48))")";
      fi;
      uvicorn app.main:app --host 0.0.0.0 --port 8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crypto_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  backups:
